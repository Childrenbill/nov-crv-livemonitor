<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Control · NOV Digital Service CRV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141719;--bg-2:#1a1e21;--panel:#1f2427;--panel-2:#262c30;
  --line:#31383d;--line-2:#454c54;--text:#eef1f3;--text-soft:#a8b1ba;--muted:#6a737c;
  --max-teal:#26b5b8;--max-teal-soft:#4fd4d7;
  --d:#5dc88a;--n:#5b8fd9;--dn:#f0a248;--nd:#b07ed4;--f:#7a8694;--dcp:#e85a5a;
}
body.light{
  --bg:#eef1f4;--bg-2:#e3e8ec;--panel:#ffffff;--panel-2:#f6f8fa;
  --line:#d5dbe1;--line-2:#b9c2ca;--text:#00205B;--text-soft:#3d4a5c;--muted:#7a858f;
  --max-teal:#0e8a8d;--max-teal-soft:#0072CE;
  --d:#3bb375;--n:#4a83d4;--dn:#e6941f;--nd:#a066cc;--f:#8a949e;--dcp:#dd4747;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100%}
body{padding-bottom:3rem}
.wrap{max-width:520px;margin:0 auto;padding:0.9rem 0.9rem 2rem}
header{position:sticky;top:0;z-index:10;background:var(--bg);padding:0.7rem 0.9rem;margin:0 -0.9rem 0.9rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:0.7rem}
header .htitle{flex:1;min-width:0}
header .htitle b{display:block;font-family:'JetBrains Mono',monospace;font-size:0.85rem;letter-spacing:0.08em;color:var(--text)}
header .htitle small{display:block;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.06em;color:var(--muted);margin-top:0.15rem}
.conn{display:flex;align-items:center;gap:0.35rem;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.conn .dot{width:0.5rem;height:0.5rem;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.conn.on .dot{background:var(--d);box-shadow:0 0 6px var(--d)}
.conn.off .dot{background:var(--dcp)}
.themebtn{width:2.3rem;height:2.3rem;border-radius:50%;border:1px solid var(--line-2);background:var(--panel);color:var(--text-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.themebtn svg{width:1.15rem;height:1.15rem}
h2{font-family:'JetBrains Mono',monospace;font-size:0.78rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-soft);font-weight:700;margin:1.3rem 0 0.6rem}
h2:first-of-type{margin-top:0}
h2 span{color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}
.grouplabel{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;font-weight:700;color:var(--g-col,var(--muted));margin:0.8rem 0 0.4rem;display:flex;align-items:center;gap:0.4rem}
.grouplabel::before{content:'';width:0.6rem;height:0.6rem;border-radius:50%;background:var(--g-col,var(--muted));flex-shrink:0}
.chiprow{display:flex;flex-wrap:wrap;gap:0.5rem}
.techchip{font-family:'Manrope',sans-serif;font-weight:700;font-size:0.92rem;background:var(--panel);border:1.5px solid var(--g-col,var(--line-2));color:var(--text);padding:0.65rem 1rem;border-radius:0.8rem;cursor:pointer;user-select:none;display:flex;align-items:center;gap:0.4rem;min-height:2.6rem}
.techchip .tag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;color:var(--g-col,var(--muted));opacity:0.85}
.techchip:active{transform:scale(0.97)}
.emptynote{font-size:0.85rem;color:var(--muted);padding:0.5rem 0.1rem}
.basewrap{background:var(--panel);border:1px dashed var(--line-2);border-radius:1rem;padding:0.8rem;margin-top:0.7rem}
.basewrap .bl{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:0.5rem}
.basechip{font-family:'Manrope',sans-serif;font-weight:700;font-size:0.9rem;background:var(--bg-2);border:1.5px solid var(--b-col,var(--line-2));color:var(--text-soft);padding:0.6rem 0.95rem;border-radius:0.8rem;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:0.4rem;min-height:2.5rem}
.fleetcard{background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--f-col,var(--max-teal));border-radius:1rem;padding:0.9rem 1rem;margin-bottom:0.7rem;display:flex;flex-direction:column;gap:0.6rem}
.fleetcard .fhead{display:flex;align-items:baseline;justify-content:space-between}
.fleetcard .fcode{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.15rem;color:var(--text)}
.fleetcard .fplate{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);letter-spacing:0.05em}
.fleetcard .frow{display:flex;gap:0.6rem;align-items:center}
.festbtn{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:0.85rem;letter-spacing:0.08em;padding:0.6rem 1rem;border-radius:0.7rem;background:var(--f-col,var(--muted));color:#0f1419;border:none;min-height:2.6rem;flex-shrink:0}
.festbtn:active{opacity:0.85}
.ftecsel{flex:1;font-family:'Manrope',sans-serif;font-size:0.92rem;font-weight:700;background:var(--bg-2);border:1px solid var(--line-2);color:var(--text);border-radius:0.7rem;padding:0.65rem 0.7rem;min-height:2.6rem;appearance:none;-webkit-appearance:none}
.ftecsel:focus{outline:none;border-color:var(--max-teal)}
footer{text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.08em;margin-top:1.6rem;padding-top:0.9rem;border-top:1px solid var(--line)}
</style>
</head>

  </div>

  <div id="fleetList"></div>

  <footer>NOV Digital Service · Comodoro Rivadavia</footer>
</div>

// ===== HORARIOS DE FRANJAS DE TÉCNICOS (idéntico a monitor.html) =====
const TECH_WINDOWS = { 'D':[6,18], 'D CP':[6,18], 'D-N':[12,24], 'N':[18,30], 'N-D':[0,12] };
const GROUP_CODES=['D','D-N','N','N-D'];
const TURNOS = {
  'D':{color:'var(--d)',name:'Día'}, 'N':{color:'var(--n)',name:'Noche'},
  'D-N':{color:'var(--dn)',name:'Día → Noche'}, 'N-D':{color:'var(--nd)',name:'Noche → Día'},
  'F':{color:'var(--f)',name:'Franco'}
};
const MONTH_ES = ['','ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const DOW_FULL = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
function pad(n){return String(n).padStart(2,'0')}
function weekStartDate(w){ return new Date(w.start.y, w.start.m-1, w.start.d); }
function weekEndDate(w){ return new Date(w.end.y, w.end.m-1, w.end.d); }
function findWeekForDate(date){
  const d=new Date(date); d.setHours(0,0,0,0);
  for(let i=0;i<DATA.weeks.length;i++){
    const s=weekStartDate(DATA.weeks[i]); const e=weekEndDate(DATA.weeks[i]); const ep=new Date(e); ep.setHours(23,59,59);
    if(d>=s && d<=ep) return i;
  }
  return -1;
}
function activeWindow(code, now){
  const wdef=TECH_WINDOWS[code]; if(!wdef) return null;
  for(const off of [-1,0]){
    const base=new Date(now); base.setHours(0,0,0,0); base.setDate(base.getDate()+off);
    const start=new Date(base); start.setHours(wdef[0],0,0,0);
    const end=new Date(base.getTime()+wdef[1]*3600000);
    if(now>=start && now<end) return {code, start, end, opDate:base, w:wdef};
  }
  return null;
}
function techsForCode(code, opDate){
  const wIdx=findWeekForDate(opDate);
  if(wIdx<0) return [];
  const w=DATA.weeks[wIdx];
  if(code==='D'){
    return DATA.people.filter(p=>w.turnos[p]==='D'||w.turnos[p]==='D CP').map(p=>({name:p, code:w.turnos[p]}));
  }
  return DATA.people.filter(p=>w.turnos[p]===code).map(p=>({name:p, code}));
}

const FLEET_COLOR = {campo:'var(--d)', taller:'var(--dn)', base:'var(--f)'};
let fleetData = {};
function cycleFleetState(code){
  const cur=(fleetData[code]&&fleetData[code].estado)||'base';
  const next=FLEET_STATES[(FLEET_STATES.indexOf(cur)+1)%FLEET_STATES.length];
  fbdb.ref('fleet/'+code+'/estado').set(next);
}
function setFleetTech(code, name){
  fbdb.ref('fleet/'+code+'/tecnico').set(name);
}
function renderFleet(){
  document.getElementById('fleetList').innerHTML = FLEET_LIST.map(v=>{
    const d=fleetData[v.code]||{estado:'base',tecnico:''};
    const col=FLEET_COLOR[d.estado]||'var(--f)';
    const opts=['<option value="">— Sin asignar —</option>'].concat(
      DATA.people.map(p=>'<option value="'+p+'"'+(d.tecnico===p?' selected':'')+'>'+p+'</option>')
    ).join('');
    return '<div class="fleetcard" style="--f-col:'+col+'">'+
      '<div class="fhead"><span class="fcode">'+v.code+'</span><span class="fplate">'+v.plate+'</span></div>'+

        '<button class="festbtn" onclick="cycleFleetState(\''+v.code+'\')">'+FLEET_LABEL[d.estado]+'</button>'+
        '<select class="ftecsel" onchange="setFleetTech(\''+v.code+'\', this.value)">'+opts+'</select>'+

  }).join('');
}

// ===== RENDER TÉCNICOS EN TURNO =====
function renderTechs(){
  const now=new Date();
  document.getElementById('hdate').textContent = DOW_FULL[now.getDay()]+' '+pad(now.getDate())+' '+MONTH_ES[now.getMonth()+1];
  const liveWins = GROUP_CODES.map(c=>activeWindow(c,now)).filter(Boolean).sort((a,b)=>a.start-b.start);
  let total=0;
  document.getElementById('techGroups').innerHTML = liveWins.map(win=>{
    const tc=TURNOS[win.code]||{color:'var(--muted)'};
    const techs=techsForCode(win.code, win.opDate).filter(t=>!baseSet.has(t.name));
    total+=techs.length;
    const chips = techs.length ? techs.map(t=>{
      const tag=(t.code==='D CP')?'<span class="tag">D CP</span>':'';
      return '<div class="techchip" style="--g-col:'+tc.color+'" onclick="toggleBase(\''+t.name+'\')">'+t.name+tag+'</div>';
    }).join('') : '<div class="emptynote">Cuadrilla completa en base</div>';
    return '<div class="grouplabel" style="--g-col:'+tc.color+'">'+win.code+' · '+pad(win.start.getHours())+':00 → '+pad(win.end.getHours()%24)+':00</div>'+
      '<div class="chiprow">'+chips+'</div>';
  }).join('');
  document.getElementById('techCount').textContent = '· '+total+' activos';
  const bw=document.getElementById('baseWrap');
  if(baseSet.size){
    bw.style.display='block';
    document.getElementById('baseChips').innerHTML = Array.from(baseSet).map(n=>{
      let col='var(--muted)';
      for(const w of liveWins){ if(techsForCode(w.code,w.opDate).some(t=>t.name===n)){ col=(TURNOS[w.code]||{}).color||col; break; } }
      return '<div class="basechip" style="--b-col:'+col+'" onclick="toggleBase(\''+n+'\')">'+n+'</div>';
    }).join('');
  } else { bw.style.display='none'; }
}

  const t=document.body.classList.contains('light')?'dark':'light';

  applyTheme(t);
}
